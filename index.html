<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>feeling stuck?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <section class="panel">
      <header class="panel__header">
        <span class="panel__badge" aria-hidden="true">
          <svg class="paw" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <ellipse cx="6.5" cy="9" rx="1.9" ry="2.5" />
            <ellipse cx="10.2" cy="6.6" rx="1.9" ry="2.6" />
            <ellipse cx="13.8" cy="6.6" rx="1.9" ry="2.6" />
            <ellipse cx="17.5" cy="9" rx="1.9" ry="2.5" />
            <path d="M12 11.2c-2.8 0-5.3 2-6 4.6-.5 2 1 3.7 3 3.5 1-.1 2-.6 3-.6s2 .5 3 .6c2 .2 3.5-1.5 3-3.5-.7-2.6-3.2-4.6-6-4.6z" />
          </svg>
        </span>
        <p class="panel__eyebrow">Habitat Inspiration</p>
      </header>

      <div class="panel__body">
        <h1 id="headline" aria-live="polite">Feeling stuck?</h1>
        <p id="status" class="loading" aria-live="polite">Loading…</p>
        <div id="player" class="player-box"><div id="player-mount"></div></div>
        <div class="actions">
          <button id="shuffle" type="button" disabled>show me something else</button>
        </div>
      </div>
    </section>
  </main>

  <!-- config.js (gitignored) defines window.YT_CONFIG = { API_KEY }. -->
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
